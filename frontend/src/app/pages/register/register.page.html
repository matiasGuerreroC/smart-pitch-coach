<ion-content class="ion-padding ion-text-center">

  <div class="auth-centered-container">
    
    <header class="auth-brand">
      <h2>AIPitch<span class="dot">.</span></h2>
      <p class="subtitle">Crea tu cuenta de entrenamiento inteligente</p>
    </header>

    <div class="auth-card">
      <form (ngSubmit)="onRegister()">
        
        <div class="input-field-group">
          <label>Nombre Completo</label>
          <div class="input-inner-wrapper">
            <ion-icon name="person-outline"></ion-icon>
            <ion-input type="text" placeholder="Tu Nombre" [(ngModel)]="nombre" name="nombre" required class="custom-auth-input"></ion-input>
          </div>
        </div>

        <div class="input-field-group">
          <label>Correo Electrónico</label>
          <div class="input-inner-wrapper">
            <ion-icon name="mail-outline"></ion-icon>
            <ion-input type="email" placeholder="nombre@universidad.cl" [(ngModel)]="email" name="email" required class="custom-auth-input"></ion-input>
          </div>
        </div>

        <div class="input-field-group">
          <label>Contraseña</label>
          <div class="input-inner-wrapper">
            <ion-icon name="lock-closed-outline"></ion-icon>
            <ion-input type="password" placeholder="Mínimo 8 caracteres" [(ngModel)]="pass" name="pass" required class="custom-auth-input"></ion-input>
          </div>
        </div>

        <ion-button expand="block" type="submit" class="btn-auth-submit">
          <ion-icon slot="start" name="person-add-outline"></ion-icon>
          Crear Cuenta
        </ion-button>

      </form>
    </div>

    <footer class="auth-footer">
      <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
    </footer>

  </div>

</ion-content>
